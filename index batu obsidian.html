 <div class="container">
    <div class="row">
       <div class="col-md-6">
          <h4 class="mb-2 mt-3">Batu obsidian adalah kaca vulkanik alami yang terbentuk dari lava felsik yang mendingin sangat cepat, mencegah pembentukan kristal. Batuan beku ekstrusif ini berwarna hitam mengkilap (atau coklat/hijau), bertekstur halus, amorf, dan memiliki patahan konkoidal yang sangat tajam. Sering digunakan untuk perhiasan, alat potong, dan artefak sejarah karena kekerasannya. 
         
         <h1>Berikut detail mengenai batu obsidian:</h1>
         <h4 class="mb-2 mt-3">
            •Proses Pembentukan:Obsidian terbentuk dari lava cair yang kaya silika mendingin dengan cepat di permukaan bumi (misalnya di tepi aliran lava riolitik), sehingga tidak sempat membentuk kristal.
          <h4 class="mb-2 mt-3">
            •Karakteristik Fisik:Tekstur Seperti kaca, warnanya hitam, juga bisa berwarna cokelat, abu-abu, hijau, atau memiliki bercak (snowflake obsidian) karena inklusi mineral atau gas, kekerasan sekitar 5-5.5 pada skala Mohs, pecahan membentuk tepi yang sangat tajam seperti kaca.
            
 <img src="Batu obsidian.jpg" class="tas export"          
    
 <div class="container">

           <h4 class="mb-2 mt-3">Sejak zaman dahulu batu obsidian digunakan untuk mata panah, ujung tombak, dan pisau. Di era modern, digunakan sebagai perhiasan, ornamen, bahkan pisau bedah eksperimen karena ketajamannya. Batu obsidian ditemukan di daerah vulkanik aktif di seluruh dunia, termasuk di Indonesia (Flores, Sumatra, Jawa, Papua), Jepang, Islandia, Meksiko, dan Amerika Serikat.Batu obsidian juga memiliki jenis lain yaitu Apache Tears adalah jenis obsidian kecil, bulat, dan halus yang ditemukan di Amerika Serikat barat daya.
