         <h1>Tas Les Catino</h1>
         <h4 class="mb-2 mt-3">Les Catino adalah brand tas lokal Indonesia yang didirikan sejak 1992, menawarkan produk berkualitas tinggi dengan desain elegan, modern, dan fungsional. Menggunakan material PVC yang tahan lama dan tahan gores, Les Catino menyediakan berbagai jenis tas wanita seperti tote bag, sling bag, shoulder bag, backpack, dan satchel dengan harga terjangkau (mulai dari Rp100 ribuan).

         <h1>poin-poin mengenai tas Les Catino:</h1>
         <h4 class="mb-2 mt-3">
         •Desain & Koleksi: Les Catino dikenal dengan model yang bervariasi, termasuk desain monogram, Flore Collection (warna pastel), serta koleksi bestseller seperti Keyuna Mini.
         <h4 class="mb-2 mt-3">
         •Material: Produk terbuat dari bahan kulit sintetis berkualitas tinggi (PVC) yang diklaim tahan gores dan tahan lama.
         <h4 class="mb-2 mt-3">
         •Keunggulan: Desainnya menggabungkan gaya simpel dan mewah, cocok untuk aktivitas sehari-hari maupun acara formal.
         <h4 class="mb-2 mt-3">
         •Harga: Harga sangat bervariasi, untuk tas selempang mulai Rp100.000, tas tangan mulai Rp200.000, dan model lainnya berkisar Rp500.000 - Rp1.200.000.
